# Server
server.port=8080

# Database (XAMPP MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/todoplanner?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
app.jwt.secret=todoplanner-super-secret-key-change-in-production-at-least-256-bits-long
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
